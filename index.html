<!DOCTYPE html>
<html>
<head>
  <title>Football Film Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,102,0.14), transparent 35%),
        linear-gradient(180deg, #050505, #0b0b0b);
      color: white;
      min-height: 100vh;
    }

    header {
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 2px solid #00ff66;
      padding: 28px 16px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,255,102,0.18);
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      color: #00ff66;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      margin: 8px 0 0;
      color: #aaa;
      font-size: 14px;
    }

    .container {
      max-width: 1150px;
      margin: auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      background: rgba(18,18,18,0.9);
      border: 1px solid #222;
      padding: 14px;
      border-radius: 16px;
      position: sticky;
      top: 10px;
      z-index: 5;
      backdrop-filter: blur(10px);
    }

    input, select {
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #090909;
      color: white;
      outline: none;
      font-size: 14px;
    }

    input {
      flex: 1;
    }

    input:focus, select:focus {
      border-color: #00ff66;
      box-shadow: 0 0 0 2px rgba(0,255,102,0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #171717, #0f0f0f);
      border: 1px solid #252525;
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      transition: 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: #00ff66;
      opacity: 0.8;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #00ff66;
      box-shadow: 0 12px 28px rgba(0,255,102,0.18);
    }

    .card h3 {
      margin: 10px 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .meta {
      font-size: 13px;
      color: #aaa;
      margin: 7px 0;
    }

    .score {
      color: #00ff66;
      font-weight: bold;
      font-size: 15px;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(0,255,102,0.12);
      color: #00ff66;
      border: 1px solid rgba(0,255,102,0.25);
    }

    .view {
      display: none;
      margin-top: 20px;
      padding: 26px;
      background: linear-gradient(180deg, #171717, #0f0f0f);
      border-radius: 20px;
      border: 1px solid #252525;
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    .view h2 {
      margin-top: 0;
      color: #00ff66;
      font-size: 28px;
    }

    #info {
      color: #ddd;
      line-height: 1.6;
    }

    button {
      margin-top: 18px;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #00ff66;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.15s ease;
    }

    button:hover {
      background: #00e65c;
      transform: translateY(-2px);
    }

    .back {
      display: inline-block;
      margin-top: 18px;
      color: #00ff66;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #888;
      padding: 35px;
      border: 1px dashed #333;
      border-radius: 16px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      header {
        padding: 22px 12px;
      }

      header h1 {
        font-size: 24px;
      }

      .topbar {
        flex-direction: column;
        position: static;
      }

      input, select {
        font-size: 16px;
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }

      .card h3 {
        font-size: 19px;
      }

      .view {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Football Film Archive</h1>
  <p>Classic games, scores, notes, and full film links</p>
</header>

<div class="container">

  <div class="topbar">
    <input id="search" placeholder="Search by team, date, score, or note...">
    <select id="filter">
      <option value="all">All Games</option>
      <option value="win">Wins</option>
      <option value="loss">Losses</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>

  <div id="view" class="view">
    <h2 id="title"></h2>
    <p id="info"></p>

    <button id="watchBtn">▶ Watch Game on YouTube</button>

    <div class="back" onclick="goBack()">← Back to Archive</div>
  </div>

</div>

<script src="games.js"></script>

<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");
const filter = document.getElementById("filter");
const view = document.getElementById("view");

function render(list) {
  grid.innerHTML = "";

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty">No games found. Try another search.</div>`;
    return;
  }

  list.forEach(g => {
    const card = document.createElement("div");
    card.className = "card";

    const resultText = g.result === "win" ? "WIN" : "LOSS";

    card.innerHTML = `
      <h3>${g.title}</h3>
      <div class="meta">${g.date}</div>
      <div class="meta score">${g.score}</div>
      <div class="meta">${g.note}</div>
      <span class="tag">${resultText}</span>
    `;

    card.onclick = () => openGame(g);
    grid.appendChild(card);
  });
}

function update() {
  const value = search.value.toLowerCase();
  const type = filter.value;

  const filtered = games.filter(g => {
    const matchSearch =
      g.title.toLowerCase().includes(value) ||
      g.date.toLowerCase().includes(value) ||
      g.score.toLowerCase().includes(value) ||
      g.note.toLowerCase().includes(value);

    const matchFilter =
      type === "all" || g.result === type;

    return matchSearch && matchFilter;
  });

  render(filtered);
}

search.addEventListener("input", update);
filter.addEventListener("change", update);

function openGame(game) {
  grid.style.display = "none";
  view.style.display = "block";
  document.querySelector(".topbar").style.display = "none";

  document.getElementById("title").innerText = game.title;

  document.getElementById("info").innerHTML =
    `<strong>Date:</strong> ${game.date}<br>
     <strong>Score:</strong> <span style="color:#00ff66; font-weight:bold;">${game.score}</span><br><br>
     ${game.note}`;

  document.getElementById("watchBtn").onclick = () => {
    window.open("https://www.youtube.com/watch?v=" + game.video, "_blank");
  };
}

function goBack() {
  view.style.display = "none";
  grid.style.display = "grid";
  document.querySelector(".topbar").style.display = "flex";
}

render(games);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Football Film Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,255,102,0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(180deg, #020202, #090909 45%, #050505);
    }

    header {
      padding: 42px 18px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(0,255,102,0.35);
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.95)),
        repeating-linear-gradient(
          45deg,
          rgba(0,255,102,0.05),
          rgba(0,255,102,0.05) 2px,
          transparent 2px,
          transparent 12px
        );
      box-shadow: 0 0 35px rgba(0,255,102,0.16);
    }

    .eyebrow {
      display: inline-block;
      color: #00ff66;
      border: 1px solid rgba(0,255,102,0.45);
      background: rgba(0,255,102,0.08);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 66px);
      line-height: 0.95;
      color: white;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    header h1 span {
      color: #00ff66;
      text-shadow: 0 0 22px rgba(0,255,102,0.55);
    }

    header p {
      margin: 14px auto 0;
      max-width: 650px;
      color: #bfbfbf;
      font-size: 15px;
      line-height: 1.5;
    }

    .container {
      max-width: 1180px;
      margin: auto;
      padding: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(18,18,18,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      color: #00ff66;
    }

    .stat span {
      font-size: 13px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(0,255,102,0.22);
      padding: 14px;
      border-radius: 20px;
      position: sticky;
      top: 12px;
      z-index: 10;
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    }

    input, select {
      padding: 14px;
      border-radius: 13px;
      border: 1px solid #272727;
      background: #080808;
      color: white;
      outline: none;
      font-size: 14px;
    }

    input {
      flex: 1;
    }

    input:focus, select:focus {
      border-color: #00ff66;
      box-shadow: 0 0 0 3px rgba(0,255,102,0.13);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 220px;
      padding: 20px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01)),
        #101010;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.22s ease;
      box-shadow: 0 16px 35px rgba(0,0,0,0.38);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(0,255,102,0.16), transparent 45%),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 12px,
          rgba(255,255,255,0.025) 12px,
          rgba(255,255,255,0.025) 13px
        );
      opacity: 0.9;
      pointer-events: none;
    }

    .card::after {
      content: "FILM";
      position: absolute;
      right: -10px;
      bottom: 8px;
      font-size: 56px;
      font-weight: 900;
      color: rgba(255,255,255,0.035);
      letter-spacing: 3px;
    }

    .card:hover {
      transform: translateY(-7px) scale(1.01);
      border-color: rgba(0,255,102,0.75);
      box-shadow: 0 18px 45px rgba(0,255,102,0.16);
    }

    .card-content {
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .badge.win {
      color: #001a0a;
      background: #00ff66;
    }

    .badge.loss {
      color: white;
      background: rgba(255,70,70,0.18);
      border: 1px solid rgba(255,70,70,0.45);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 21px;
      line-height: 1.2;
    }

    .meta {
      font-size: 14px;
      color: #b5b5b5;
      margin: 8px 0;
    }

    .score {
      color: #00ff66;
      font-weight: bold;
      font-size: 17px;
    }

    .watch-line {
      margin-top: 18px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      opacity: 0.9;
    }

    .view {
      display: none;
      margin-top: 20px;
      padding: 28px;
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(0,255,102,0.12), transparent 45%),
        #101010;
      border: 1px solid rgba(0,255,102,0.28);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .view h2 {
      margin: 0 0 14px;
      color: white;
      font-size: clamp(28px, 6vw, 48px);
      text-transform: uppercase;
    }

    #info {
      color: #ddd;
      line-height: 1.7;
      font-size: 16px;
    }

    button {
      margin-top: 22px;
      padding: 17px;
      width: 100%;
      border: none;
      border-radius: 16px;
      background: #00ff66;
      color: #000;
      font-weight: 900;
      cursor: pointer;
      font-size: 16px;
      transition: 0.18s ease;
      box-shadow: 0 12px 25px rgba(0,255,102,0.18);
    }

    button:hover {
      background: #00e65c;
      transform: translateY(-2px);
    }

    .back {
      display: inline-block;
      margin-top: 20px;
      color: #00ff66;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #aaa;
      padding: 42px;
      border: 1px dashed #333;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }

    @media (max-width: 768px) {
      header {
        padding: 34px 14px 24px;
      }

      header p {
        font-size: 14px;
      }

      .container {
        padding: 14px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .stat {
        padding: 14px;
      }

      .topbar {
        flex-direction: column;
        position: static;
        border-radius: 18px;
      }

      input, select {
        font-size: 16px;
        padding: 15px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        min-height: 205px;
        padding: 19px;
        border-radius: 22px;
      }

      .card h3 {
        font-size: 20px;
      }

      .view {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="eyebrow">GAME FILM VAULT</div>
  <h1>Football <span>Film</span> Archive</h1>
  <p>Classic games, scores, notes, and full film links organized in one clean archive.</p>
</header>

<div class="container">

  <div class="stats">
    <div class="stat">
      <strong id="totalGames">0</strong>
      <span>Total Games</span>
    </div>
    <div class="stat">
      <strong id="totalWins">0</strong>
      <span>Wins</span>
    </div>
    <div class="stat">
      <strong id="totalLosses">0</strong>
      <span>Losses</span>
    </div>
  </div>

  <div class="topbar">
    <input id="search" placeholder="Search by team, date, score, or note...">
    <select id="filter">
      <option value="all">All Games</option>
      <option value="win">Wins</option>
      <option value="loss">Losses</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>

  <div id="view" class="view">
    <h2 id="title"></h2>
    <p id="info"></p>
    <button id="watchBtn">▶ Watch Game on YouTube</button>
    <div class="back" onclick="goBack()">← Back to Archive</div>
  </div>

</div>

<script src="games.js"></script>

<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");
const filter = document.getElementById("filter");
const view = document.getElementById("view");

function setStats() {
  document.getElementById("totalGames").innerText = games.length;
  document.getElementById("totalWins").innerText = games.filter(g => g.result === "win").length;
  document.getElementById("totalLosses").innerText = games.filter(g => g.result === "loss").length;
}

function render(list) {
  grid.innerHTML = "";

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty">No games found. Try another search.</div>`;
    return;
  }

  list.forEach(g => {
    const card = document.createElement("div");
    card.className = "card";

    const resultText = g.result === "win" ? "WIN" : "LOSS";
    const badgeClass = g.result === "win" ? "win" : "loss";

    card.innerHTML = `
      <div class="card-content">
        <span class="badge ${badgeClass}">${resultText}</span>
        <h3>${g.title}</h3>
        <div class="meta">📅 ${g.date}</div>
        <div class="meta score">Score: ${g.score}</div>
        <div class="meta">${g.note}</div>
        <div class="watch-line">Tap to open film →</div>
      </div>
    `;

    card.onclick = () => openGame(g);
    grid.appendChild(card);
  });
}

function update() {
  const value = search.value.toLowerCase();
  const type = filter.value;

  const filtered = games.filter(g => {
    const matchSearch =
      g.title.toLowerCase().includes(value) ||
      g.date.toLowerCase().includes(value) ||
      g.score.toLowerCase().includes(value) ||
      g.note.toLowerCase().includes(value);

    const matchFilter =
      type === "all" || g.result === type;

    return matchSearch && matchFilter;
  });

  render(filtered);
}

search.addEventListener("input", update);
filter.addEventListener("change", update);

function openGame(game) {
  grid.style.display = "none";
  view.style.display = "block";
  document.querySelector(".topbar").style.display = "none";
  document.querySelector(".stats").style.display = "none";

  document.getElementById("title").innerText = game.title;

  document.getElementById("info").innerHTML =
    `<strong>Date:</strong> ${game.date}<br>
     <strong>Score:</strong> <span style="color:#00ff66; font-weight:bold;">${game.score}</span><br><br>
     ${game.note}`;

  document.getElementById("watchBtn").onclick = () => {
    window.open("https://www.youtube.com/watch?v=" + game.video, "_blank");
  };

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goBack() {
  view.style.display = "none";
  grid.style.display = "grid";
  document.querySelector(".topbar").style.display = "flex";
  document.querySelector(".stats").style.display = "grid";
}

setStats();
render(games);
</script>

</body>
</html>

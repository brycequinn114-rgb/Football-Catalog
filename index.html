<!DOCTYPE html>
<html>
<head>
  <title>Football Film Archive</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: #000;
      border-bottom: 2px solid #00ff66;
      padding: 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      color: #00ff66;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #141414;
      color: white;
      outline: none;
      font-size: 14px;
    }

    input {
      flex: 1;
    }

    input:focus, select:focus {
      border-color: #00ff66;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      background: #121212;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #00ff66;
      box-shadow: 0 6px 15px rgba(0,255,102,0.15);
    }

    .card h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .meta {
      font-size: 13px;
      color: #aaa;
      margin: 4px 0;
    }

    .score {
      color: #00ff66;
      font-weight: bold;
    }

    .view {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #121212;
      border-radius: 10px;
      border: 1px solid #1f1f1f;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #00ff66;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00e65c;
    }

    .back {
      display: inline-block;
      margin-top: 12px;
      color: #00ff66;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Football Film Archive</h1>
</header>

<div class="container">

  <div class="topbar">
    <input id="search" placeholder="Search games...">
    <select id="filter">
      <option value="all">All Games</option>
      <option value="win">Wins</option>
      <option value="loss">Losses</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>

  <div id="view" class="view">
    <h2 id="title"></h2>
    <p id="info"></p>

    <button id="watchBtn">Watch Game on YouTube</button>

    <div class="back" onclick="goBack()">← Back</div>
  </div>

</div>

<!-- DATA FILE (DO NOT CHANGE STRUCTURE) -->
<script src="games.js"></script>

<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");
const filter = document.getElementById("filter");
const view = document.getElementById("view");

function render(list) {
  grid.innerHTML = "";

  list.forEach(g => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${g.title}</h3>
      <div class="meta">${g.date}</div>
      <div class="meta score">${g.score}</div>
      <div class="meta">${g.note}</div>
    `;

    card.onclick = () => openGame(g);
    grid.appendChild(card);
  });
}

function update() {
  const value = search.value.toLowerCase();
  const type = filter.value;

  const filtered = games.filter(g => {
    const matchSearch =
      g.title.toLowerCase().includes(value) ||
      g.date.toLowerCase().includes(value) ||
      g.score.toLowerCase().includes(value) ||
      g.note.toLowerCase().includes(value);

    const matchFilter =
      type === "all" || g.result === type;

    return matchSearch && matchFilter;
  });

  render(filtered);
}

search.addEventListener("input", update);
filter.addEventListener("change", update);

function openGame(game) {
  grid.style.display = "none";
  view.style.display = "block";

  document.getElementById("title").innerText = game.title;

  document.getElementById("info").innerHTML =
    game.date +
    " | Score: <span style='color:#00ff66'>" +
    game.score +
    "</span><br><br>" +
    game.note;

  document.getElementById("watchBtn").onclick = () => {
    window.open(
      "https://www.youtube.com/watch?v=" + game.video,
      "_blank"
    );
  };
}

function goBack() {
  view.style.display = "none";
  grid.style.display = "grid";
}

render(games);
</script>

</body>
</html>
